# docker-compose.yml — Development stack
# Run with: docker compose up --build
#
# Services:
#   nginx    → Reverse proxy (port 80). Routes /api and /admin to Laravel, / to Vite.
#   php-fpm  → Laravel 11 application (PHP 8.2)
#   mysql    → MySQL 8.0 database (port 3306 exposed for dev tools like TablePlus)
#   node     → React 18 + Vite dev server with Hot Module Replacement (port 5173)

services:

  # ─── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: webroblox_nginx
    ports:
      - "80:80"
    volumes:
      # Nginx config
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      # Laravel public directory (so nginx can serve Filament's static assets directly)
      - ./backend:/var/www/html:ro
    depends_on:
      - php-fpm
      - node
    networks:
      - webroblox_network

  # ─── PHP-FPM (Laravel) ────────────────────────────────────────────────────
  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: webroblox_php
    volumes:
      # Bind mount for live code changes (dev only)
      - ./backend:/var/www/html
      # Named volume for vendor directory — much faster than host bind mount
      - backend_vendor:/var/www/html/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - webroblox_network

  # ─── MySQL database ───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: webroblox_mysql
    ports:
      # Exposed in dev so you can connect with a GUI like TablePlus or DBeaver
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      # Named volume so data persists between `docker compose down` and `up`
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Wait until MySQL is ready before starting php-fpm
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - webroblox_network

  # ─── Node (Vite dev server with HMR) ─────────────────────────────────────
  node:
    image: node:20-alpine
    container_name: webroblox_node
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      # Bind mount for live code changes
      - ./frontend:/app
      # Named volume for node_modules — much faster than host bind mount
      - frontend_node_modules:/app/node_modules
    # Install deps then start Vite. --host makes it listen on all interfaces (needed inside Docker)
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - webroblox_network

# ─── Named volumes ────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  backend_vendor:
    driver: local
  frontend_node_modules:
    driver: local

# ─── Network ──────────────────────────────────────────────────────────────
networks:
  webroblox_network:
    driver: bridge
