# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from dev:
#   - node service is REMOVED (React is pre-built)
#   - nginx serves pre-built /dist as static files
#   - MySQL port NOT exposed to host
#   - PHP APP_ENV=production, APP_DEBUG=false
#   - No bind mounts for code (uses image or named volumes only)

services:

  nginx:
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
      # Pre-built React app served as static files
      - frontend_dist:/var/www/frontend/dist:ro
    depends_on:
      - php-fpm
    # Override: remove node dependency (no node service in prod)

  php-fpm:
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  mysql:
    # Do NOT expose port 3306 to host in production
    ports: []

# ─── Additional volume for the pre-built React bundle ─────────────────────
volumes:
  frontend_dist:
    driver: local
