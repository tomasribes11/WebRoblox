# docker/nginx/nginx.dev.conf
# Development nginx configuration
# Routes:
#   /api/*   → Laravel (php-fpm via FastCGI)
#   /admin/* → Laravel (php-fpm via FastCGI)
#   /*       → Vite dev server (node container, port 5173)

server {
    listen 80;
    server_name localhost;

    # Increase body size for file uploads in Filament admin
    client_max_body_size 20M;

    # ─── Laravel: API and Admin panel ───────────────────────────────────────
    location ^~ /api/ {
        try_files $uri /index.php?$query_string;
    }

    location ^~ /admin {
        try_files $uri /index.php?$query_string;
    }

    # ─── Filament system routes (exports, Livewire components, etc.) ────────
    location ^~ /filament/ {
        try_files $uri /index.php?$query_string;
    }

    # ─── Livewire routes (JS assets + AJAX message endpoint) ────────────────
    location ^~ /livewire/ {
        try_files $uri /index.php?$query_string;
    }

    # ─── Filament published static assets (CSS/JS published by filament:assets)
    location ^~ /js/filament/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    location ^~ /css/filament/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # ─── Other published vendor assets ───────────────────────────────────────
    location ^~ /vendor/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # ─── Laravel Vite build assets ───────────────────────────────────────────
    location ^~ /build/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # ─── PHP processing ─────────────────────────────────────────────────────
    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ─── Laravel static assets (storage, vendor assets used by Filament) ────
    location ~ ^/storage/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # ─── React dev server (Vite HMR) ────────────────────────────────────────
    # All other requests go to the Vite dev server running in the node container
    location / {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;

        # Required for Vite's WebSocket-based Hot Module Replacement
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
