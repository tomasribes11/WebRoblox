# docker/nginx/nginx.prod.conf
# Production nginx configuration
# React is pre-built to /var/www/frontend/dist — served as static files.
# Laravel handles /api/* and /admin/* via FastCGI.

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # ─── Laravel: API and Admin panel ───────────────────────────────────────
    location ~ ^/(api|admin)(/.*)?$ {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass php-fpm:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # ─── Laravel storage (user uploads) ─────────────────────────────────────
    location ~ ^/storage/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # ─── React SPA (pre-built static files) ─────────────────────────────────
    root /var/www/frontend/dist;
    index index.html;

    location / {
        # Try the file, then fall back to index.html for client-side routing
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
